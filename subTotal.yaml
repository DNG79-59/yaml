# йҖҡз”Ёи®ҫзҪ®
mode: rule
log-level: error
# DNSжЁЎеқ—
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: true

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  use-hosts: false
  use-system-hosts: false

  # еҗҜеҠЁйҳ¶ж®өи§Јжһҗ DNS жңҚеҠЎеҷЁжң¬иә«
  default-nameserver:
    - 223.5.5.5
    - 1.1.1.1

  # еӣҪеҶ… DNSпјҲдјҳе…Ҳпјү
  nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query

  # еӣҪеӨ– DNSпјҲfallbackпјү
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN

    # йҳІжӯўејӮеёёIP
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32

    # еӣҪеӨ–еҹҹеҗҚзӣҙжҺҘиө° fallback
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
      - +.twitter.com
      - +.github.com
      - +.wikipedia.org
      - +.cloudflare.com
      - +.openai.com
      - +.telegram.org
      - +.discord.com

  # ж №жҚ®и§„еҲҷеҶіе®ҡ DNS
  follow-rule: true

  respect-rules: true

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - time.*.com
    - ntp.*.com
    - "*.ntp.org"

  # иҠӮзӮ№и§Јжһҗ DNSпјҲйҳІжӯўиҠӮзӮ№еҹҹеҗҚиў«жұЎжҹ“пјү
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

  direct-nameserver:
    - https://223.5.5.5/dns-query
